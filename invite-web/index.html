<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вишлист</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0eeff;
      padding: 20px 16px 56px;
      min-height: 100vh;
    }

    .container { max-width: 480px; margin: 0 auto; }

    .header {
      background: linear-gradient(135deg, #6D57FC 0%, #9B79F6 100%);
      border-radius: 24px;
      padding: 32px 24px;
      text-align: center;
      color: #fff;
      margin-bottom: 14px;
    }

    .avatar {
      width: 68px;
      height: 68px;
      background: rgba(255,255,255,.22);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: 700;
      margin: 0 auto 14px;
    }

    .owner-sub { font-size: 13px; opacity: .8; margin-bottom: 6px; }

    .room-name {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .date-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,.2);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 13px;
    }

    .open-btn {
      display: block;
      background: #fff;
      color: #6D57FC;
      border-radius: 16px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      text-align: center;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(109,87,252,.15);
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 10px;
    }

    .wish {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #fff;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .wish.done { opacity: .45; }

    .wish-img {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      object-fit: cover;
      flex-shrink: 0;
      background: #ede9ff;
    }

    .wish-info { flex: 1; min-width: 0; }

    .wish-name {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 4px;
    }

    .wish-price { font-size: 15px; font-weight: 700; color: #6D57FC; }

    .badge {
      display: inline-block;
      margin-top: 5px;
      background: #f0f0f0;
      border-radius: 8px;
      padding: 2px 9px;
      font-size: 11px;
      color: #888;
    }

    .empty {
      text-align: center;
      color: #aaa;
      padding: 32px 0;
      font-size: 14px;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #888;
      font-size: 15px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e0d9ff;
      border-top-color: #6D57FC;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      max-width: 360px;
      margin: 60px auto 0;
      background: #fff;
      border-radius: 20px;
      padding: 40px 24px;
      text-align: center;
    }

    .error-box h2 { color: #6D57FC; margin-bottom: 8px; font-size: 18px; }
    .error-box p { color: #888; font-size: 14px; }
  </style>
</head>
<body>

<div class="container" id="app">
  <div class="loading">
    <div class="spinner"></div>
    Загрузка...
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://jmbjjfpeotrikittygdt.supabase.co'
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImptYmpqZnBlb3RyaWtpdHR5Z2R0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NTUzMDcsImV4cCI6MjA5MDAzMTMwN30.pJCKLgD6CzYUwuCd53vTbDwtH23FbP4vt4svFwnXGpY'
  const APP_SCHEME = 'wishlist'

  const headers = {
    'apikey': SUPABASE_ANON_KEY,
    'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
  }

  async function fetchJSON(path) {
    const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, { headers })
    if (!res.ok) throw new Error(res.status)
    return res.json()
  }

  function formatPrice(price) {
    return Math.round(price).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '\u00a0')
  }

  function formatDate(iso) {
    if (!iso) return ''
    return new Date(iso).toLocaleDateString('ru-RU', {
      day: 'numeric', month: 'long', year: 'numeric'
    })
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
  }

  function renderWish(w) {
    const img = w.image_url
      ? `<img class="wish-img" src="${esc(w.image_url)}" alt="" onerror="this.style.background='#ede9ff';this.removeAttribute('src')">`
      : `<div class="wish-img"></div>`
    const price = w.price
      ? `<p class="wish-price">${formatPrice(Number(w.price))} ₽</p>`
      : ''
    const badge = w.is_fulfilled ? `<span class="badge">Забронировано</span>` : ''
    return `
      <div class="wish${w.is_fulfilled ? ' done' : ''}">
        ${img}
        <div class="wish-info">
          <p class="wish-name">${esc(w.name)}</p>
          ${price}${badge}
        </div>
      </div>`
  }

  function showError(msg) {
    document.getElementById('app').innerHTML = `
      <div class="error-box">
        <h2>Вишлист не найден</h2>
        <p>${esc(msg)}</p>
      </div>`
  }

  async function init() {
    const params = new URLSearchParams(location.search)
    const roomId = params.get('room')

    if (!roomId || isNaN(Number(roomId))) {
      showError('Ссылка недействительна.')
      return
    }

    try {
      const [rooms, wishes] = await Promise.all([
        fetchJSON(`rooms?id=eq.${roomId}&select=id,name,event_date,owner&limit=1`),
        fetchJSON(`wishes?room_id=eq.${roomId}&select=id,name,price,image_url,is_fulfilled&order=is_fulfilled.asc,id.asc`),
      ])

      if (!rooms.length) {
        showError('Ссылка устарела или вишлист стал приватным.')
        return
      }

      const room = rooms[0]

      const owners = await fetchJSON(`users_info?uuid=eq.${esc(room.owner)}&select=name&limit=1`)
      const ownerName = owners[0]?.name || 'Пользователь'

      const initial = ownerName[0]?.toUpperCase() || '?'
      const deepLink = `${APP_SCHEME}://invite?room=${roomId}`
      const dateLine = room.event_date
        ? `<div class="date-chip">${esc(formatDate(room.event_date))}</div>`
        : ''
      const wishesHtml = wishes.length
        ? wishes.map(renderWish).join('')
        : '<p class="empty">Вишлист пока пуст</p>'

      document.title = `${ownerName} — ${room.name}`

      document.getElementById('app').innerHTML = `
        <div class="header">
          <div class="avatar">${initial}</div>
          <p class="owner-sub">${esc(ownerName)} приглашает вас</p>
          <h1 class="room-name">${esc(room.name)}</h1>
          ${dateLine}
        </div>
        <a class="open-btn" href="${esc(deepLink)}">Открыть в приложении &rarr;</a>
        <p class="section-title">Вишлист</p>
        ${wishesHtml}
      `
    } catch (e) {
      showError('Не удалось загрузить данные.')
    }
  }

  init()
</script>

</body>
</html>
